name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx oxlint .

      - name: Check formatting
        run: bunx oxfmt --check README.md package.json commitlint.config.mjs knip.config.ts entrypoints utils tests vitest.config.ts wxt.config.ts

      - name: Check unused code
        run: bun run knip

      - name: Run tests
        run: bun run test

      - name: Build extension
        run: bun run build
